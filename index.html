<!-- Firebase初期化（Babelなし通常JS） -->
<script>
(function() {
  const cfg = {
    apiKey: "AIzaSyDdKe3KQpXvKwh4AY_dOpccoBDvYyq9JNo",
    authDomain: "nextrend-crm.firebaseapp.com",
    projectId: "nextrend-crm",
    storageBucket: "nextrend-crm.firebasestorage.app",
    messagingSenderId: "52694573891",
    appId: "1:52694573891:web:5200bff00aa3694caf85f6"
  };
  try {
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    const db = firebase.firestore();
    window.__crmDb = db;

    const SYNC_KEYS = [
      'crm-candidates',
      'crm-accepted',
      'crm-interview-plans',
      'crm-candidate-meta',
      'crm-post-accept-milestones',
      'crm-goals',
    ];

    // オリジナルのsetItemを保存
    const _orig = localStorage.setItem.bind(localStorage);
    window.__lsSetItem = _orig;

    // localStorage書き込み → Firestoreにも自動反映
    localStorage.setItem = function(key, value) {
      _orig(key, value);
      if (SYNC_KEYS.includes(key) && window.__crmDb) {
        try {
          window.__crmDb.collection('crm').doc(key).set({ v: JSON.parse(value) })
            .catch(function(e) { console.warn('[Firestore] write error:', key, e); });
        } catch(e) {}
      }
    };

    // Firestore → localStorage同期（Promise返す）
    window.__syncFromFirestore = async function() {
      if (!window.__crmDb) return [];
      const synced = [];
      await Promise.all(SYNC_KEYS.map(async function(key) {
        try {
          const snap = await window.__crmDb.collection('crm').doc(key).get();
          if (snap.exists && snap.data() && snap.data().v !== undefined) {
            _orig(key, JSON.stringify(snap.data().v));
            synced.push(key);
          }
        } catch(e) { console.warn('[Firestore] read error:', key, e); }
      }));
      return synced;
    };

    // リアルタイム更新リスナー（他のCAが更新したら即反映）
    window.__startFirestoreListener = function(onUpdate) {
      if (!window.__crmDb) return;
      SYNC_KEYS.forEach(function(key) {
        window.__crmDb.collection('crm').doc(key).onSnapshot(function(snap) {
          if (snap.exists && snap.data() && snap.data().v !== undefined) {
            _orig(key, JSON.stringify(snap.data().v));
            if (onUpdate) onUpdate(key);
          }
        }, function(e) { console.warn('[Firestore] listener error:', key, e); });
      });
    };

    console.log('[Firestore] 初期化完了 - nextrend-crm');
  } catch(e) {
    console.warn('[Firestore] 初期化失敗:', e);
    window.__syncFromFirestore = async function() { return []; };
    window.__startFirestoreListener = function() {};
  }
})();
</script>

// ====== KPI CARD ======
function KPICard({ label, value, target, color, isRate = false, suffix = '', lowerIsBetter = false, monthRatio = null }) {
  const rate = pct(value, target);
  const good = lowerIsBetter ? value <= target * 0.3 : rate >= 90;
  const warn = lowerIsBetter ? (value > target * 0.3 && value <= target * 0.6) : (rate >= 60 && rate < 90);
  const bad = lowerIsBetter ? value > target * 0.6 : rate < 60;
  const badgeText = good ? '良好' : warn ? '注意' : '要改善';
  const badgeClass = good ? 'good' : warn ? 'warn' : 'bad';
  const displayValue = isRate ? `${value}%` : `${value}${suffix}`;
  // 本日必要数・本日達成率
  const todayNeeded = (monthRatio && target) ? Math.round(target * monthRatio) : null;
  const todayAchRate = (todayNeeded && todayNeeded > 0) ? Math.round(value / todayNeeded * 100) : null;
  const todayColor = todayAchRate == null ? '' : todayAchRate >= 100 ? 'var(--success)' : todayAchRate >= 70 ? 'var(--warning)' : 'var(--danger)';
  const todayNeededDisp = todayNeeded != null ? (Number.isInteger(todayNeeded) ? todayNeeded : todayNeeded.toFixed(1)) : null;
  return (
    <div className="kpi-card" style={{'--kpi-color': color}}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{displayValue}</div>
      <div className="kpi-target">目標: {isRate ? `${target}%` : `${target}${suffix}`}</div>
      <div className="kpi-progress">
        <div className="kpi-progress-fill" style={{width: `${clamp(lowerIsBetter ? 100 - pct(value, target) : rate, 0, 100)}%`}} />
      </div>
      <span className={`kpi-badge ${badgeClass}`}>{badgeText} {isRate ? '' : `${rate}%`}</span>
      {todayNeededDisp !== null && (
        <div style={{fontSize:'12px', color:'var(--text-muted)', marginTop:'4px'}}>
          本日必要数: {todayNeededDisp}件
        </div>
      )}
      {todayAchRate !== null && (
        <div style={{fontSize:'12px', fontWeight:'700', color: todayColor, marginTop:'2px'}}>
          本日達成率 {todayAchRate}%
        </div>
      )}
    </div>
  );
}

// ====== DONUT KPI CARD ======
function DonutKPICard({ label, value, target, color, monthRatio = null, lowerIsBetter = false }) {
  const displayRate = target > 0 ? Math.round(value / target * 100) : 0;
  const fillRate    = Math.min(displayRate, 100);
  // lowerIsBetter（飛び+辞退など）は値が低いほど良い
  const good = lowerIsBetter ? displayRate <= 50  : displayRate >= 90;
  const warn = lowerIsBetter ? displayRate <= 80  : (displayRate >= 60 && displayRate < 90);
  const badgeText  = good ? '良好' : warn ? '注意' : '要改善';
  const badgeColor = good ? 'var(--success)' : warn ? 'var(--warning)' : 'var(--danger)';
  const badgeBg    = good ? 'var(--success-bg)' : warn ? 'var(--warning-bg)' : 'var(--danger-bg)';

  // SVG donut
  const size = 96;
  const sw   = 10;
  const r    = (size - sw) / 2;
  const circ = 2 * Math.PI * r;
  const filled = circ * fillRate / 100;

  // 本日必要数・本日達成率
  const todayNeeded    = (monthRatio && target) ? Math.round(target * monthRatio) : null;
  const todayAchRate   = (todayNeeded && todayNeeded > 0) ? Math.round(value / todayNeeded * 100) : null;
  const todayColor     = todayAchRate == null ? '' : todayAchRate >= 100 ? 'var(--success)' : todayAchRate >= 70 ? 'var(--warning)' : 'var(--danger)';
  const todayNeededDisp = todayNeeded != null ? (Number.isInteger(todayNeeded) ? todayNeeded : todayNeeded.toFixed(1)) : null;

  return (
    <div style={{
      background:'var(--bg-card)', border:'1px solid var(--border)',
      borderRadius:'var(--radius)', padding:'12px 8px 10px',
      boxShadow:'var(--shadow)', display:'flex', flexDirection:'column',
      alignItems:'center', gap:'5px', position:'relative', overflow:'hidden',
    }}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:'3px',background:color}}/>
      <div style={{fontSize:'12px',color:'var(--text-muted)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.5px',textAlign:'center'}}>{label}</div>
      {/* Donut SVG */}
      <div style={{position:'relative',width:`${size}px`,height:`${size}px`}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth={sw}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
            strokeDasharray={`${filled} ${circ}`} strokeLinecap="round"/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'1px'}}>
          <div style={{fontSize:'26px',fontWeight:'800',color:'var(--text-primary)',lineHeight:1}}>{value}</div>
          <div style={{fontSize:'12px',color:'var(--text-muted)'}}>/ {target}</div>
        </div>
      </div>
      <span style={{fontSize:'12px',fontWeight:'700',padding:'2px 8px',borderRadius:'10px',background:badgeBg,color:badgeColor}}>
        {badgeText} {displayRate}%
      </span>
      {todayNeededDisp !== null && (
        <div style={{fontSize:'12px',color:'var(--text-muted)',textAlign:'center'}}>本日必要数: {todayNeededDisp}件</div>
      )}
      {todayAchRate !== null && (
        <div style={{fontSize:'12px',fontWeight:'700',color:todayColor,textAlign:'center'}}>本日達成率 {todayAchRate}%</div>
      )}
    </div>
  );
}

// ====== RATE KPI CARD ======
function RateKPICard({ label, value, target, numerator, denominator, lowerIsBetter = false, denominatorLabel = null }) {
  const good = lowerIsBetter ? value <= target * 0.5 : value >= target;
  const warn = lowerIsBetter ? (value > target * 0.5 && value <= target) : (value >= target * 0.7 && value < target);
  const bad = lowerIsBetter ? value > target : value < target * 0.7;
  const evalClass = good ? 'eval-good' : warn ? 'eval-warn' : 'eval-bad';
  const evalText = good ? '良好' : warn ? '注意' : '要改善';
  const color = good ? 'var(--success)' : warn ? 'var(--warning)' : 'var(--danger)';
  const gaugeWidth = clamp(lowerIsBetter ? (1 - value/100)*100 : (value/target)*100, 0, 100);
  return (
    <div className="rate-kpi-card">
      <div className="rate-kpi-label">{label}</div>
      <div className="rate-kpi-value" style={{color}}>{value}%</div>
      <div className="rate-kpi-detail">{numerator}件 / {denominatorLabel || `${denominator}件`}</div>
      <div className="rate-kpi-gauge">
        <div className="rate-kpi-gauge-fill" style={{width: `${gaugeWidth}%`, background: color}} />
      </div>
      <div className="rate-kpi-meta">
        <span className="text-muted" style={{fontSize:'14px'}}>目標: {target}%</span>
        <span className={`eval-badge ${evalClass}`}>{evalText}</span>
      </div>
    </div>
  );
}

// ====== DONUT CHART ======
function DonutChart({ value, target, requiredByToday, current, size = 140 }) {
  const rate = pct(current, target);
  const reqRate = pct(requiredByToday, target);
  const r = 52;
  const circumference = 2 * Math.PI * r;
  const fillDash = (clamp(rate, 0, 100) / 100) * circumference;
  const reqDash = (clamp(reqRate, 0, 100) / 100) * circumference;
  const color = rate >= reqRate ? 'var(--success)' : rate >= reqRate * 0.7 ? 'var(--warning)' : 'var(--danger)';
  const diff = current - requiredByToday;
  return (
    <div className="donut-container">
      <svg width={size} height={size} viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke="var(--donut-track)" strokeWidth="12"/>
        {reqRate > 0 && (
          <circle cx="60" cy="60" r={r} fill="none" stroke="var(--border)" strokeWidth="12"
            strokeDasharray={`${reqDash} ${circumference}`} strokeLinecap="round"
            transform="rotate(-90 60 60)" opacity="0.4"/>
        )}
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="12"
          strokeDasharray={`${fillDash} ${circumference}`} strokeLinecap="round"
          transform="rotate(-90 60 60)" style={{transition:'stroke-dasharray 0.8s ease'}}/>
        <text x="60" y="55" textAnchor="middle" fill="var(--text-primary)" fontSize="18" fontWeight="700">{rate}%</text>
        <text x="60" y="70" textAnchor="middle" fill="var(--text-muted)" fontSize="9">受注進捗</text>
      </svg>
      <div className="donut-stats">
        <div className="donut-stat">
          <span className="donut-stat-label">目標金額</span>
          <span className="donut-stat-value">{fmtYen(target)}</span>
        </div>
        <div className="donut-stat">
          <span className="donut-stat-label">本日必要額</span>
          <span className="donut-stat-value">{fmtYen(requiredByToday)}</span>
        </div>
        <div className="donut-stat">
          <span className="donut-stat-label">現状金額</span>
          <span className="donut-stat-value" style={{color}}>{fmtYen(current)}</span>
        </div>
        <div className="separator"/>
        <div className="donut-stat">
          <span className="donut-stat-label">必要ペース差</span>
          <span className="donut-stat-value" style={{color: diff >= 0 ? 'var(--success)' : 'var(--danger)'}}>
            {diff >= 0 ? '+' : ''}{fmtYen(diff)}
          </span>
        </div>
      </div>
    </div>
  );
}

// ====== FUNNEL CHART (SVG) ======
function FunnelChart({ data }) {
  const max = data[0]?.value || 1;
  const W = 200, minW = 40, barH = 28, gap = 4;
  const totalH = data.length * (barH + gap);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${totalH}`} style={{overflow:'visible'}}>
      {data.map((d, i) => {
        const w = minW + (W - minW) * (d.value / max);
        const x = (W - w) / 2;
        const y = i * (barH + gap);
        const retentionRate = Math.round((d.value / max) * 100);
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={barH}
              fill={`var(--funnel-fill)`} opacity={1 - i * 0.08} rx="3"/>
            <text x={W/2} y={y + barH/2 + 1} textAnchor="middle"
              fill="white" fontSize="10" fontWeight="600" dominantBaseline="middle">
              {d.label} {d.value}件
            </text>
            <text x={x + w + 6} y={y + barH/2 + 1} textAnchor="start"
              fill="var(--text-muted)" fontSize="9" dominantBaseline="middle">
              {retentionRate}%
            </text>
          </g>
        );
      })}
    </svg>
  );
}

// ====== LINE CHART (SVG) ======
function LineChart({ datasets, labels, height = 140 }) {
  const W = 320, H = height, padL = 36, padR = 10, padT = 10, padB = 28;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const allVals = datasets.flatMap(d => d.data);
  const maxV = Math.max(...allVals, 1);
  const xs = labels.map((_, i) => padL + (i / (labels.length - 1)) * chartW);
  const ys = (data) => data.map(v => padT + chartH - (v / maxV) * chartH);
  const pathD = (data) => {
    const pts = xs.map((x, i) => ({ x, y: ys(data)[i] }));
    return pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  };
  const colors = ['var(--chart-1)', 'var(--chart-3)', 'var(--chart-4)', 'var(--chart-2)', 'var(--chart-5)'];
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
        const y = padT + chartH - t * chartH;
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="var(--border)" strokeWidth="1"/>
            <text x={padL - 4} y={y + 1} textAnchor="end" fill="var(--text-muted)" fontSize="8" dominantBaseline="middle">
              {Math.round(maxV * t)}
            </text>
          </g>
        );
      })}
      {labels.map((l, i) => (
        <text key={i} x={xs[i]} y={H - padB + 12} textAnchor="middle"
          fill="var(--text-muted)" fontSize="8">{l}</text>
      ))}
      {datasets.map((ds, di) => (
        <path key={di} d={pathD(ds.data)}
          fill="none" stroke={colors[di]} strokeWidth="2" strokeLinejoin="round"/>
      ))}
      {datasets.map((ds, di) => 
        xs.map((x, i) => (
          <circle key={`${di}-${i}`} cx={x} cy={ys(ds.data)[i]} r="3"
            fill={colors[di]} stroke="var(--bg-card)" strokeWidth="2"/>
        ))
      )}
      <g transform={`translate(${padL},${H})`}>
        {datasets.map((ds, di) => (
          <g key={di} transform={`translate(${di * 70}, 0)`}>
            <line x1="0" y1="0" x2="12" y2="0" stroke={colors[di]} strokeWidth="2"/>
            <text x="15" y="1" fill="var(--text-muted)" fontSize="8" dominantBaseline="middle">{ds.label}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

// ====== HORIZONTAL BAR CHART ======
function HBarChart({ data, valueFormatter }) {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:'6px'}}>
      {data.map((d, i) => {
        const pct = (d.value / max) * 100;
        return (
          <div key={i} style={{display:'flex', alignItems:'center', gap:'8px'}}>
            <div style={{width:'72px', fontSize:'15px', color:'var(--text-secondary)', textAlign:'right', flexShrink:0}}>{d.label}</div>
            <div style={{flex:1, height:'16px', background:'var(--border)', borderRadius:'3px', overflow:'hidden'}}>
              <div style={{
                width:`${pct}%`, height:'100%',
                background: d.color || 'var(--bar-fill)',
                borderRadius:'3px', transition:'width 0.6s ease',
                display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:'4px'
              }}>
                {pct > 25 && <span style={{fontSize:'11px', color:'white', fontWeight:'600'}}>{valueFormatter ? valueFormatter(d.value) : d.value}</span>}
              </div>
            </div>
            {pct <= 25 && <span style={{fontSize:'14px', color:'var(--text-secondary)', minWidth:'40px'}}>{valueFormatter ? valueFormatter(d.value) : d.value}</span>}
          </div>
        );
      })}
    </div>
  );
}

// ====== STATUS BADGE ======
function StatusBadge({ status }) {
  return (
    <span className="status-badge" style={{
      background: getStatusBg(status),
      color: getStatusColor(status),
    }}>{status}</span>
  );
}

// ====== PROGRESS TABLE COMPONENT ======
function ProgressTableSection({ data, showTodayTarget, isCurrentMonth = true }) {
  // 本日時点での必要数値を計算
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayOfMonth = now.getDate();
  const todayRatio = dayOfMonth / daysInMonth;

  return (
    <table className="progress-table">
      <thead>
        <tr>
          <th>ステージ</th>
          <th className="num" style={{color:'var(--text-muted)'}}>目標</th>
          {showTodayTarget && <th className="num" style={{color:'var(--accent)'}}>{isCurrentMonth ? '本日目標' : '月末目標'}</th>}
          <th className="num">実績</th>
          {showTodayTarget && <th className="num" style={{color:'var(--accent)'}}>{isCurrentMonth ? '日次達成率' : '月末達成率'}</th>}
          <th className="num">全体達成率</th>
          <th style={{width:'120px'}}>進捗</th>
        </tr>
      </thead>
      <tbody>
        {data.map((row, i) => {
          const lb = !!row.lowerIsBetter;
          const totalRate = pct(row.actual, row.target);
          const todayTarget = showTodayTarget ? Math.round(row.target * todayRatio) : null;
          const todayRate = showTodayTarget ? pct(row.actual, todayTarget) : null;
          const totalColor = lb
            ? (totalRate <= 50 ? 'var(--success)' : totalRate <= 80 ? 'var(--warning)' : 'var(--danger)')
            : (totalRate >= 90 ? 'var(--success)' : totalRate >= 60 ? 'var(--warning)' : 'var(--danger)');
          const todayColor = todayRate == null ? null : lb
            ? (todayRate <= 50 ? 'var(--success)' : todayRate <= 80 ? 'var(--warning)' : 'var(--danger)')
            : (todayRate >= 100 ? 'var(--success)' : todayRate >= 70 ? 'var(--warning)' : 'var(--danger)');
          const barColor = lb ? (totalRate <= 50 ? 'var(--success)' : totalRate <= 80 ? 'var(--warning)' : 'var(--danger)') : totalColor;
          return (
            <tr key={i} style={lb ? {background:'var(--bg-hover)'} : {}}>
              <td style={{fontWeight:'500'}}>
                {row.stage}{lb ? ' ↓' : ''}
                {row.carryOver > 0 && row.stage === '承諾' && (
                  <span style={{fontSize:'11px',color:'var(--accent)',marginLeft:'4px',fontWeight:'400'}}>（うち持越{row.carryOver}件）</span>
                )}
              </td>
              <td className="num" style={{color:'var(--text-muted)'}}>{row.target}{lb ? '以下' : ''}</td>
              {showTodayTarget && <td className="num" style={{color:'var(--accent)', fontWeight:'600'}}>{todayTarget}</td>}
              <td className="num" style={{fontWeight:'700'}}>{row.actual}</td>
              {showTodayTarget && (
                <td className="num" style={{color:todayColor, fontWeight:'700'}}>
                  {todayRate}%
                </td>
              )}
              <td className="num" style={{color:totalColor, fontWeight:'700'}}>{totalRate}%</td>
              <td>
                <div className="stage-bar">
                  <div className="stage-bar-fill" style={{width:`${clamp(totalRate,0,100)}%`, background:barColor}} />
                </div>
              </td>
            </tr>
          );
        })}
      </tbody>
    </table>
  );
}

// リアルデータからKPI指標を計算するヘルパー関数
// period: "YYYY/MM" 形式（例 "2026/05"）。指定された月の firstInterviewDate を持つ候補者のみ集計。
function _calcRealMetrics(candidates, period) {
  // 各ステージを「アクションが発生した月」でカウントする方式
  // 例：4月推薦→5月企業面接 の人は 推薦=4月カウント、企業面接=5月カウント
  const periodKey = period ? period.replace('/', '-') : null;
  const pk = periodKey; // e.g., "2026-04"

  const DR = { firstInterview:80, bridge:50, proposal:75, recommendation:60, companyInterview:67, offer:50, acceptance:50 };
  let goals = null;
  try {
    const allGoals = JSON.parse(localStorage.getItem('crm-goals')||'{}');
    const now = new Date();
    const monthKey = pk || `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    goals = allGoals[`${CA_MY_NAME}_${monthKey}`] || allGoals[CA_MY_NAME] || null;
  } catch {}
  const gs = goals?.settings || 25;
  const gr = goals?.rates || DR;

  // 目標値を計算（gs=面接設定目標, gFI=初回面接目標）
  const gFI  = Math.round(gs  * (gr.firstInterview   || 80) / 100);
  const gBR  = Math.round(gFI  * (gr.bridge           || 50) / 100);
  const gPR  = Math.round(gBR  * (gr.proposal         || 75) / 100);
  const gREC = Math.round(gPR  * (gr.recommendation   || 60) / 100);
  const gCI  = Math.round(gREC * (gr.companyInterview || 67) / 100);
  const gOF  = Math.round(gCI  * (gr.offer            || 50) / 100);
  const gAC  = Math.round(gOF  * (gr.acceptance       || 50) / 100);
  const gFly = Math.max(1, Math.round(gFI * 0.35));

  const _todayStr = new Date().toISOString().slice(0, 10);

  // ─── 各ステージを日付フィールドでカウント（全候補者を対象） ───

  // 面接設定: createdAt（登録日）がこの月
  const aFI = pk
    ? candidates.filter(c => (c.createdAt||c.firstInterviewDate||'').slice(0,7) === pk).length
    : candidates.length;

  // 飛び系ステータス（前辞退・面接飛び・飛び（旧称：飛び(辞退)））を一括定義
  const FLY_ST = ['飛び(辞退)', '飛び', '前辞退', '面接飛び'];

  // 初回面接: firstInterviewDate がこの月 かつ 過去（≤今日）かつ 面接設定/飛び系でない
  const aINT = pk
    ? candidates.filter(c => {
        const fid = (c.firstInterviewDate||'').slice(0,10);
        const st = c.caStatus||c.status;
        return fid.startsWith(pk) && fid <= _todayStr && st !== '面接設定' && !FLY_ST.includes(st);
      }).length
    : candidates.filter(c => { const st=c.caStatus||c.status; return !!c.firstInterviewDate && st !== '面接設定' && !FLY_ST.includes(st); }).length;

  // 飛び+辞退: 前辞退・面接飛び・飛び(辞退) を全てカウント
  const aFly = pk
    ? candidates.filter(c => {
        const fid = (c.firstInterviewDate||'').slice(0,10);
        return fid.startsWith(pk) && fid <= _todayStr && FLY_ST.includes(c.caStatus||c.status);
      }).length
    : candidates.filter(c => FLY_ST.includes(c.caStatus||c.status)).length;

  // 救出不可: status が '救出不可'
  const aUnresq = pk
    ? candidates.filter(c => {
        const fid = (c.firstInterviewDate||'').slice(0,10);
        return fid.startsWith(pk) && fid <= _todayStr && (c.caStatus||c.status) === '救出不可';
      }).length
    : candidates.filter(c => (c.caStatus||c.status) === '救出不可').length;

  // ブリッジ成功: bridgeDate がこの月 かつ bridgeResult='成功'
  const aBR = pk
    ? candidates.filter(c => {
        const bd = (c.bridgeDate||'').slice(0,10);
        return bd.startsWith(pk) && bd <= _todayStr && c.bridgeResult === '成功';
      }).length
    : candidates.filter(c => c.bridgeResult === '成功').length;

  // 企業提案: proposalDate がこの月
  const aPR = pk
    ? candidates.filter(c => {
        const pd = (c.proposalDate||'').slice(0,10);
        return pd.startsWith(pk) && pd <= _todayStr;
      }).length
    : candidates.filter(c => !!c.proposalDate).length;

  // 推薦: recommendationDate がこの月
  const aREC = pk
    ? candidates.filter(c => {
        const rd = (c.recommendationDate||'').slice(0,10);
        return rd.startsWith(pk) && rd <= _todayStr;
      }).length
    : candidates.filter(c => !!c.recommendationDate).length;

  // 企業面接: companyInterviewDate がこの月（専用フィールド）
  const aCI = pk
    ? candidates.filter(c => {
        const cd = (c.companyInterviewDate||'').slice(0,10);
        return cd.startsWith(pk) && cd <= _todayStr;
      }).length
    : candidates.filter(c => !!c.companyInterviewDate).length;

  // 内定: offerDate がこの月
  const aOF = pk
    ? candidates.filter(c => {
        const od = (c.offerDate||'').slice(0,10);
        return od.startsWith(pk) && od <= _todayStr;
      }).length
    : candidates.filter(c => !!c.offerDate).length;

  // 承諾: crm-candidates の status='承諾' の候補者をカウント（CA自身の担当のみ）
  let aAC = 0;
  let aCO_AC = 0;
  try {
    const _accCands = candidates.filter(c => (c.status === '承諾' || c.caStatus === '承諾'));
    if (pk) {
      const thisAcc = _accCands.filter(c => {
        const ad = (c.acceptedAt || c.offerDate || '').slice(0, 10);
        return ad.startsWith(pk) && ad <= _todayStr;
      });
      aAC = thisAcc.length;
      // 持ち越し承諾: 今月承諾 AND firstInterviewDate が前月以前
      aCO_AC = thisAcc.filter(c => {
        const fid = (c.firstInterviewDate || '').slice(0, 7);
        return fid && fid < pk;
      }).length;
    } else {
      aAC = _accCands.length;
    }
  } catch {}

  // 有効候補者数（登録月の候補者のうち飛び・辞退・救出不可以外）
  const ENDED_ST = ['飛び(辞退)', '飛び', '前辞退', '面接飛び', '救出不可', '見送り'];
  const aVA = pk
    ? candidates.filter(c => (c.createdAt||c.firstInterviewDate||'').slice(0,7) === pk && !ENDED_ST.includes(c.caStatus||c.status)).length
    : candidates.filter(c => !ENDED_ST.includes(c.caStatus||c.status)).length;

  // 飛び率計算（初回+飛び の合計を分母）
  const flyDenom = aINT + aFly;
  const pastFly = aFly;
  const flyRateToday = flyDenom > 0 ? Math.round(aFly / flyDenom * 100) : 0;

  const kpi = {
    validApplications:  { value: aVA,     target: null },
    interviewSet:       { value: aFI,     target: gs   },
    flyDropout:         { value: aFly,    target: gFly, lowerIsBetter: true },
    unreachable:        { value: aUnresq, target: null, lowerIsBetter: true },
    initialInterview:   { value: aINT,    target: gFI  },
    bridgeSuccess:      { value: aBR,     target: gBR  },
    proposal:           { value: aPR,     target: gPR  },
    recommendation:     { value: aREC,    target: gREC },
    companyInterview:   { value: aCI,     target: gCI  },
    offer:              { value: aOF,     target: gOF  },
    acceptance:         { value: aAC,     target: gAC  },
  };

  const stageProgress = [
    { stage: '面接設定',    actual: aFI,     target: gs,   lowerIsBetter: false },
    { stage: '飛び+辞退',  actual: aFly,    target: gFly, lowerIsBetter: true  },
    { stage: '救出不可',    actual: aUnresq, target: null, lowerIsBetter: true  },
    { stage: '初回面接',    actual: aINT,    target: gFI,  lowerIsBetter: false },
    { stage: 'ブリッジ成功', actual: aBR,  target: gBR,  lowerIsBetter: false },
    { stage: '企業提案',    actual: aPR,  target: gPR,  lowerIsBetter: false },
    { stage: '推薦',        actual: aREC, target: gREC, lowerIsBetter: false },
    { stage: '企業面接',    actual: aCI,  target: gCI,  lowerIsBetter: false },
    { stage: '内定',        actual: aOF,  target: gOF,  lowerIsBetter: false },
    { stage: '承諾',        actual: aAC,  target: gAC,  lowerIsBetter: false, carryOver: aCO_AC },
  ];

  const rateKpis = [
    // 飛び率：飛び ÷ (初回面接 + 飛び) × 100
    { label: '飛び率',     value: flyRateToday,
      target: 35,  numerator: pastFly, denominator: flyDenom, lowerIsBetter: true,
      denominatorLabel: `初回+飛び(${flyDenom}件)` },
    // ブリッジ率：初回面接 → ブリッジ成功
    { label: 'ブリッジ率', value: aINT > 0 ? Math.round(aBR/aINT*100) : 0,
      target: gr.bridge||50,       numerator: aBR,  denominator: aINT, lowerIsBetter: false },
    // 企業提案率：ブリッジ成功 → 企業提案
    { label: '企業提案率', value: aBR > 0 ? Math.round(aPR/aBR*100) : 0,
      target: gr.proposal||75,     numerator: aPR,  denominator: aBR, lowerIsBetter: false },
    // 推薦率：企業提案 → 推薦
    { label: '推薦率',     value: aPR > 0 ? Math.round(aREC/aPR*100) : 0,
      target: gr.recommendation||60, numerator: aREC, denominator: aPR, lowerIsBetter: false },
    // 企業面接率：推薦 → 企業面接
    { label: '企業面接率', value: aREC > 0 ? Math.round(aCI/aREC*100) : 0,
      target: gr.companyInterview||67, numerator: aCI, denominator: aREC, lowerIsBetter: false },
    // 内定率：企業面接 → 内定
    { label: '内定率',     value: aCI > 0 ? Math.round(aOF/aCI*100) : 0,
      target: gr.offer||50,        numerator: aOF,  denominator: aCI, lowerIsBetter: false },
    // 承諾率：内定 → 承諾
    { label: '承諾率',     value: aOF > 0 ? Math.round(aAC/aOF*100) : 0,
      target: gr.acceptance||50,   numerator: aAC,  denominator: aOF, lowerIsBetter: false },
  ];

  const funnelData = [
    { label: '面接設定', value: aFI },
    { label: 'ブリッジ', value: aBR },
    { label: '企業提案', value: aPR },
    { label: '企業面接', value: aCI },
    { label: '内定',     value: aOF },
    { label: '承諾',     value: aAC },
  ];

  // 受注金額を crm-accepted から計算（period指定時はその月のものだけ）
  let myAccepted = [];
  try {
    const _acc = JSON.parse(localStorage.getItem('crm-accepted') || '[]');
    let _mine = _acc.filter(a => a.assignedCA === CA_MY_NAME);
    if (pk) {
      _mine = _mine.filter(a => {
        const ad = (a.acceptedAt||'').slice(0,10);
        return ad.startsWith(pk) && ad <= _todayStr;
      });
    }
    myAccepted = _mine;
  } catch {}
  const _revCur = myAccepted.reduce((s, a) => s + (Number(a.contractAmount) || 0), 0);
  const _revTgt = goals?.targets?.revenueTarget
    || (goals?.targets?.acceptance ? goals.targets.acceptance * 500000 : null)
    || (goals?.settings ? goals.settings * 500000 : 3000000);
  // 本日必要額は当月のみ意味がある。過去月は月末時点で算出
  const _now = new Date();
  let _dayProgress, _daysInM;
  if (periodKey) {
    const [py, pm] = periodKey.split('-').map(Number);
    _daysInM = new Date(py, pm, 0).getDate();
    const isCurMonth = py === _now.getFullYear() && pm === (_now.getMonth() + 1);
    _dayProgress = isCurMonth ? _now.getDate() : _daysInM;
  } else {
    _daysInM = new Date(_now.getFullYear(), _now.getMonth() + 1, 0).getDate();
    _dayProgress = _now.getDate();
  }
  const revenue = {
    current: _revCur,
    target: _revTgt,
    requiredByToday: Math.round(_revTgt * _dayProgress / _daysInM),
  };

  return { kpi, stageProgress, rateKpis, funnelData, settings: gs, revenue };
}

function _loadMyMetrics(period) {
  try {
    const stored = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
    const mine = Array.isArray(stored) ? stored.filter(c => c.assignedCA === CA_MY_NAME) : [];
    return _calcRealMetrics(mine, period);
  } catch { return _calcRealMetrics([], period); }
}

// 面接カード・提案中・対応事項をリアルデータから生成
function _loadSummaryData() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const tomorrowStr = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
  const in7DaysStr = new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10);

  let cands = [], plans = {}, accepted = [], meta = {};
  try {
    const s = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
    cands = Array.isArray(s) ? s.filter(c => c.assignedCA === CA_MY_NAME) : [];
  } catch {}
  try { plans = JSON.parse(localStorage.getItem('crm-interview-plans') || '{}'); } catch {}
  try { accepted = JSON.parse(localStorage.getItem('crm-accepted') || '[]'); } catch {}
  try { meta = JSON.parse(localStorage.getItem('crm-candidate-meta') || '{}'); } catch {}

  // 本日の初回面接（firstInterviewDate が今日）
  const interviewsFirstToday = cands
    .filter(c => (c.firstInterviewDate || '').startsWith(todayStr))
    .map(c => ({
      name: c.name,
      time: (c.firstInterviewDate || '').length > 10 ? c.firstInterviewDate.slice(11, 16) : '—',
      type: '初回面接',
    }));

  // 本日の企業面接（crm-interview-plans の今日エントリ）
  const interviewsToday = [];
  Object.entries(plans).forEach(([cid, entries]) => {
    const cand = cands.find(c => c.id === cid);
    if (!cand) return;
    (entries || []).forEach(e => {
      if ((e.date || '').startsWith(todayStr)) {
        // 書類選考中は除外
        if (e.selectionStatus === '書類選考中') return;
        // 確定返信待ち（未確定）も含めない（確定済み = pendingConfirm=true のみ表示）
        if (!e.pendingConfirm) return;
        // 終了済み（候補者側・選考側）は除外
        const _cs = cand.caStatus || cand.status || '';
        if (['飛び(辞退)','飛び','前辞退','面接飛び','救出不可','見送り','承諾'].includes(_cs)) return;
        if ((meta[cid] || {}).terminated) return;
        if (['選考辞退','書類お見送り','面接お見送り'].includes(e.selectionStatus)) return;
        interviewsToday.push({
          name: cand.name,
          company: e.company || '—',
          time: (e.date || '').length > 10 ? e.date.slice(11, 16) : '—',
          type: e.selectionStatus || '企業面接',
        });
      }
    });
  });

  // 今後7日の面接予定（今日〜7日後）— 今日は赤太字表示
  const interviewsUpcoming = [];
  Object.entries(plans).forEach(([cid, entries]) => {
    const cand = cands.find(c => c.id === cid);
    if (!cand) return;
    (entries || []).forEach(e => {
      const d = (e.date || '').slice(0, 10);
      if (d >= todayStr && d <= in7DaysStr) {
        // 書類選考中は今後の面接予定に含めない
        if (e.selectionStatus === '書類選考中') return;
        // 確定返信待ち（未確定）も含めない（確定済み = pendingConfirm=true のみ表示）
        if (!e.pendingConfirm) return;
        // 終了済みは除外
        const _cs2 = cand.caStatus || cand.status || '';
        if (['飛び(辞退)','飛び','前辞退','面接飛び','救出不可','見送り','承諾'].includes(_cs2)) return;
        if ((meta[cid] || {}).terminated) return;
        if (['選考辞退','書類お見送り','面接お見送り'].includes(e.selectionStatus)) return;
        interviewsUpcoming.push({
          name: cand.name,
          company: e.company || '—',
          date: d.slice(5).replace('-', '/'),
          isToday: d === todayStr,
          type: e.selectionStatus || '企業面接',
        });
      }
    });
  });
  interviewsUpcoming.sort((a, b) => a.date.localeCompare(b.date));

  // 面接確定返信待ち
  // ① 初回面接設定中で firstInterviewDate 未設定
  const pendingReply = [
    ...cands
      .filter(c => (c.caStatus || c.status || '') === '面接設定' && !c.firstInterviewDate)
      .map(c => {
        const days = c.createdAt
          ? Math.floor((Date.now() - new Date(c.createdAt).getTime()) / 86400000)
          : 0;
        return {
          name: c.name,
          memo: days > 2 ? `初回面接 確定返信待ち（${days}日経過）` : `初回面接 確定返信待ち`,
          urgent: days > 2,
        };
      }),
    // ② 企業面接管理で「確定」チェックが付いていないエントリ（=まだ確定返信待ち）
    ...(() => {
      const result = [];
      Object.entries(plans).forEach(([cid, entries]) => {
        const cand = cands.find(c => c.id === cid);
        if (!cand) return;
        const _cs3 = cand.caStatus || cand.status || '';
        if (['飛び(辞退)','飛び','前辞退','面接飛び','救出不可','見送り','承諾'].includes(_cs3)) return; // 終了済み除外
        if ((meta[cid] || {}).terminated) return; // 企業面接管理側で終了されたものも除外
        (entries || []).forEach(e => {
          if (['選考辞退','書類お見送り','面接お見送り'].includes(e.selectionStatus)) return;
          if (e.selectionStatus === '書類選考中') return; // 書類選考中は除外
          // 確定チェックが付いていない = 確定返信待ち
          if (!e.pendingConfirm) {
            const dateStr = e.date ? e.date.slice(5,10).replace('-','/') : '日時未確定';
            const candMemo = (cand.memo || '').trim();
            result.push({
              name: cand.name,
              memo: `${e.company||'企業'} · ${dateStr}`,
              candidateMemo: candMemo,
              urgent: true,
            });
          }
        });
      });
      return result;
    })(),
  ];

  // ブリッジ成功（企業提案前）: caStatus === 'ブリッジ成功' かつ 企業面接管理で「終了」されていない候補者
  const proposalCandidates = cands.filter(c => {
    const cs = c.caStatus || c.status || '';
    if (cs !== 'ブリッジ成功') return false;
    if ((meta[c.id] || {}).terminated) return false;
    return true;
  }).map(c => {
    // 最新の提案企業をinterview plansから取得
    const cpList = plans[c.id] || [];
    const activeCompanies = cpList
      .filter(cp => !['選考辞退','書類お見送り','面接お見送り'].includes(cp.selectionStatus||''))
      .map(cp => cp.company || '').filter(Boolean);
    const latestCompany = activeCompanies[activeCompanies.length - 1] || c.companyName || '—';
    const stageDate = c.bridgeDate || c.recommendationDate || c.proposalDate || '';
    return { ...c, _propCompany: latestCompany, _propDate: stageDate.slice(0,10) };
  });

  // 対応事項（ルールベースで自動生成）
  const actions = [];
  // 承諾期限アラート（カスタム日数対応）
  const _tdStr = new Date().toISOString().slice(0,10);
  Object.entries(plans).forEach(([cid, cpList]) => {
    const cand = cands.find(c => c.id === cid);
    if (!cand) return;
    (cpList || []).forEach(cp => {
      if (cp.selectionStatus === '内定' && cp.offerDeadline) {
        const dl = cp.offerDeadline.slice(5).replace('-','/');
        const daysLeft = Math.ceil((new Date(cp.offerDeadline) - new Date(_tdStr)) / 86400000);
        const alertDays = cp.alertDays !== undefined ? Number(cp.alertDays) : 3;
        if (daysLeft < 0) {
          actions.push({ priority: '高', text: `${cand.name} — ${cp.company||''}  承諾期限超過（${dl}）`, due: '至急確認', urgent: true });
        } else if (daysLeft <= alertDays) {
          const dueLabel = daysLeft === 0 ? '本日期限' : daysLeft === 1 ? '明日まで' : `あと${daysLeft}日`;
          actions.push({ priority: '高', text: `${cand.name} — ${cp.company||''}  承諾期限（${dl}）`, due: dueLabel, urgent: true });
        }
      }
    });
  });
  cands.filter(c => (c.caStatus || c.status) === '内定').forEach(c => {
    actions.push({ priority: '高', text: `${c.name} — 内定承諾確認連絡`, due: '本日中', urgent: true });
  });
  pendingReply.filter(p => p.urgent).forEach(p => {
    actions.push({ priority: '高', text: `${p.name} — 返信督促`, due: '本日中', urgent: true });
  });
  cands.filter(c => (c.caStatus || c.status) === '初回面接').forEach(c => {
    actions.push({ priority: '高', text: `${c.name} — ブリッジ確認・結果フォロー`, due: '今週中', urgent: false });
  });
  cands.filter(c => (c.caStatus || c.status) === 'ブリッジ成功').forEach(c => {
    actions.push({ priority: '中', text: `${c.name} — 企業提案・求人紹介`, due: '今週中', urgent: false });
  });
  interviewsFirstToday.forEach(iv => {
    actions.push({ priority: '中', text: `${iv.name} — 初回面接後ブリッジ確認`, due: '本日中', urgent: false });
  });
  accepted.filter(a => a.assignedCA === CA_MY_NAME && !a.joiningDate).forEach(a => {
    actions.push({ priority: '低', text: `${a.name} — 承諾後入社準備確認`, due: '今週中', urgent: false });
  });
  if (actions.length === 0) {
    actions.push({ priority: '低', text: '本日の対応事項はありません', due: '—', urgent: false });
  }

  return { interviewsFirstToday, interviewsToday, interviewsUpcoming, pendingReply, proposalCandidates, actions };
}

function SummaryPage({ period }) {
  const [metrics, setMetrics] = React.useState(() => _loadMyMetrics(period));
  React.useEffect(() => {
    setMetrics(_loadMyMetrics(period)); // 月変更時に即時更新
    const reload = () => setMetrics(_loadMyMetrics(period));
    window.addEventListener('focus', reload);
    window.addEventListener('crm-data-changed', reload);
    return () => {
      window.removeEventListener('focus', reload);
      window.removeEventListener('crm-data-changed', reload);
    };
  }, [period]);
  const MY_KPI = metrics.kpi;
  const STAGE_PROGRESS = metrics.stageProgress;
  const RATE_KPIS = metrics.rateKpis;
  const FUNNEL_DATA = metrics.funnelData;
  const MY_REVENUE = metrics.revenue || { current: 0, target: 3000000, requiredByToday: 0 };

  const [summaryData, setSummaryData] = React.useState(_loadSummaryData);
  React.useEffect(() => {
    const reloadS = () => setSummaryData(_loadSummaryData());
    window.addEventListener('focus', reloadS);
    window.addEventListener('crm-data-changed', reloadS);
    return () => {
      window.removeEventListener('focus', reloadS);
      window.removeEventListener('crm-data-changed', reloadS);
    };
  }, []);
  const { interviewsFirstToday: INTERVIEWS_FIRST_TODAY, interviewsToday: INTERVIEWS_TODAY,
    interviewsUpcoming: INTERVIEWS_UPCOMING, pendingReply: PENDING_REPLY,
    proposalCandidates, actions: ACTIONS } = summaryData;

  const revenueRate = pct(MY_REVENUE.current, MY_REVENUE.target);
  const revenueColor = revenueRate >= 90 ? 'var(--success)' : revenueRate >= 60 ? 'var(--warning)' : 'var(--danger)';
  const now = new Date();
  // period "2026/05" → year/month、なければ今月
  const [selY, selM] = period ? period.split('/').map(Number) : [now.getFullYear(), now.getMonth()+1];
  const daysInMonth = new Date(selY, selM, 0).getDate();
  const isCurrentMonth = selY === now.getFullYear() && selM === (now.getMonth()+1);
  const dayOfMonth = isCurrentMonth ? now.getDate() : daysInMonth;
  const monthProgressPct = Math.round(dayOfMonth / daysInMonth * 100);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:'14px'}}>
      {/* 月次進捗バナー */}
      <div style={{
        background:'var(--accent-subtle)', border:'1px solid var(--accent-light)',
        borderRadius:'var(--radius)', padding:'10px 16px',
        display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap'

          <div className="kpi-target">目標: {MY_KPI.acceptance.target}件</div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'14px'}}>
        <div className="card">
          <div className="card-header">
            <div className="card-title">本日の初回面接</div>
            <span className="badge-count" style={{background:'var(--chart-2)'}}>{INTERVIEWS_FIRST_TODAY.length}</span>
          </div>
          <div className="card-body">
            {INTERVIEWS_FIRST_TODAY.length === 0
              ? <div className="empty-state">本日の初回面接なし</div>
              : INTERVIEWS_FIRST_TODAY.map((iv, i) => (
                <div key={i} className="interview-item">
                  <div className="interview-dot" style={{background:'var(--chart-2)'}} />
                  <div>
                    <div className="interview-name">{iv.name}</div>
                    <div className="interview-meta">{iv.time} · {iv.type}</div>

                </div>
              ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header">
            <div className="card-title">本日の企業面接</div>
            <span className="badge-count" style={{background:'var(--danger)'}}>{INTERVIEWS_TODAY.length}</span>
          </div>
          <div className="card-body">
            {INTERVIEWS_TODAY.length === 0
              ? <div className="empty-state">本日の面接なし</div>
              : INTERVIEWS_TODAY.map((iv, i) => (
                <div key={i} className="interview-item">
                  <div className="interview-dot" style={{background:'var(--danger)'}} />
                  <div>
                    <div className="interview-name">{iv.name}</div>
                    <div className="interview-meta">{iv.company} · {iv.time} · {iv.type}</div>
                  </div>
                </div>
              ))}

          <div className="card-header">
            <div className="card-title">今後の面接予定</div>
            <span className="badge-count">{INTERVIEWS_UPCOMING.length}</span>
          </div>
          <div className="card-body">
            {(() => {
              const tomorrowFmt = new Date(Date.now() + 86400000).toISOString().slice(5,10).replace('-','/');
              return INTERVIEWS_UPCOMING.map((iv, i) => {
                const isToday = !!iv.isToday;
                const isTomorrow = !isToday && iv.date === tomorrowFmt;
                let wrapStyle = {};
                if (isToday) {
                  wrapStyle = { background:'#fef2f2', borderLeft:'3px solid #dc2626', borderRadius:'6px', paddingLeft:'8px', marginBottom:'4px' };
                } else if (isTomorrow) {
                  wrapStyle = { background:'#fff7ed', borderLeft:'3px solid #f97316', borderRadius:'6px', paddingLeft:'8px', marginBottom:'4px' };
                }
                const nameStyle = isToday
                  ? { color:'#dc2626', fontWeight:'800' }
                  : isTomorrow ? { color:'#c2410c', fontWeight:'700' } : {};
                const metaStyle = isToday
                  ? { color:'#dc2626', fontWeight:'700' }
                  : isTomorrow ? { color:'#ea580c' } : {};
                const dotColor = isToday ? '#dc2626' : (isTomorrow ? '#f97316' : 'var(--accent)');
                return (
                  <div key={i} className="interview-item" style={wrapStyle}>
                    <div className="interview-dot" style={{background: dotColor}} />
                    <div>
                      <div className="interview-name" style={nameStyle}>
                        {iv.name}{isToday && <span style={{marginLeft:'6px',fontSize:'10px',background:'#dc2626',color:'#fff',padding:'1px 6px',borderRadius:'4px'}}>本日</span>}
                      </div>
                      <div className="interview-meta" style={metaStyle}>{iv.company} · {iv.date} · {iv.type}</div>
                    </div>
                  </div>
                );
              });
            })()}
          </div>
        </div>
        <div className="card">
          <div className="card-header">
            <div className="card-title">面接確定返信待ち</div>
            <span className="badge-count" style={{background:'var(--warning)'}}>{PENDING_REPLY.length}</span>
          </div>
          <div className="card-body">
            {PENDING_REPLY.length === 0
              ? <div className="empty-state">確定返信待ちなし</div>
              : PENDING_REPLY.map((p, i) => (
              <div key={i} className="interview-item">
                <div className="interview-dot" style={{background: p.urgent ? 'var(--danger)' : 'var(--warning)'}} />
                <div style={{flex:1}}>
                  <div className="interview-name">{p.name}</div>
                  <div className="interview-meta" style={{color: p.urgent ? 'var(--danger)' : undefined}}>{p.memo}</div>
                  {p.candidateMemo && (
                    <div style={{
                      fontSize:'11px', color:'var(--text-muted)', marginTop:'2px',
                      background:'var(--bg-base)', padding:'3px 6px', borderRadius:'4px',
                      borderLeft:'2px solid var(--accent-light)',
                      overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                    }}>📝 {p.candidateMemo}</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Row 4: Proposals + Actions */}
      <div className="grid-2">
        <div className="card">
          <div className="card-header">
            <div className="card-title">🌉 ブリッジ成功（企業提案準備中）</div>
            <span className="badge-count">{proposalCandidates.length}</span>
          </div>
          <div className="card-body" style={{maxHeight:'180px', overflowY:'auto'}}>
            {proposalCandidates.length === 0
              ? <div className="empty-state">ブリッジ成功の候補者なし</div>
              : proposalCandidates.map((c, i) => (
              <div key={i} className="interview-item">
                <div className="interview-dot" style={{background: getStatusColor(c.caStatus || c.status)}} />
                <div style={{flex:1}}>
                  <div style={{display:'flex', justifyContent:'space-between'}}>
                    <div className="interview-name">{c.name}</div>
                    <StatusBadge status={c.caStatus || c.status} />
                  </div>
                  <div className="interview-meta">{c._propCompany} · {c._propDate || '—'}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header">
            <div className="card-title">✅ 対応事項</div>
            <span className="badge-count" style={{background:'var(--danger)'}}>{ACTIONS.filter(a=>a.urgent).length}</span>
          </div>
          <div className="card-body">
            {ACTIONS.map((a, i) => (
              <div key={i} className="action-item">
                <span className="action-priority" style={{
                  background: a.priority==='高' ? 'var(--danger-bg)' : a.priority==='中' ? 'var(--warning-bg)' : 'var(--info-bg)',
                  color: a.priority==='高' ? 'var(--danger)' : a.priority==='中' ? 'var(--warning)' : 'var(--info)',
                }}>{a.priority}</span>
                <div>
                  <div className="action-text">{a.text}</div>
                  <div className="action-due">{a.due}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

    </div>
  );
}

function CandidatesPage() {
  const [search, setSearch] = React.useState('');
  const [statusFilter, setStatusFilter] = React.useState('全て');
  const [showEnded, setShowEnded] = React.useState(false);
  const [sortKey, setSortKey] = React.useState('createdAt');
  const [sortDir, setSortDir] = React.useState('desc');
  const [historyId, setHistoryId] = React.useState(null);

  const loadMyCandidates = () => {
    try {
      const stored = JSON.parse(localStorage.getItem('crm-candidates') || 'null');
      if (stored && Array.isArray(stored)) {
        return stored.filter(c => c.assignedCA === CA_MY_NAME);
      }
    } catch {}
    return [];
  };
  const [candidates, setCandidates] = React.useState(loadMyCandidates);

  // フォーカス時に最新データを再読み込み
  React.useEffect(() => {
    const handleFocus = () => setCandidates(loadMyCandidates());
    window.addEventListener('focus', handleFocus);
    return () => window.removeEventListener('focus', handleFocus);
  }, []);

  const loadInterviewPlans = () => {
    try { return JSON.parse(localStorage.getItem('crm-interview-plans') || '{}'); } catch { return {}; }
  };
  const [interviewPlans] = React.useState(loadInterviewPlans);

  const getEarliestInterview = (cid) => {
    const plans = interviewPlans[cid] || [];
    const dates = plans.map(p => (p.date || '').substring(0,10)).filter(Boolean).sort();
    return dates[0] || null;
  };

  const handleInlineStatus = (id, newStatus) => {
    // ステータス変更時に対応する日付フィールドを自動セット（未設定の場合のみ）
    const todayISO = new Date().toISOString().slice(0, 10);
    const autoDateFields = (c, st) => {
      const extra = {};
      if (st === 'ブリッジ成功' && !c.bridgeDate)         { extra.bridgeDate = todayISO; extra.bridgeResult = '成功'; }
      if (st === '企業提案'     && !c.proposalDate)        { extra.proposalDate = todayISO; }
      if (st === '推薦'         && !c.recommendationDate)  { extra.recommendationDate = todayISO; }
      if (st === '企業面接'     && !c.companyInterviewDate){ extra.companyInterviewDate = todayISO; }
      if (st === '内定'         && !c.offerDate)           { extra.offerDate = todayISO; }
      if (st === '承諾'         && !c.acceptedAt)          { extra.acceptedAt = todayISO; }
      return extra;
    };
    const addHistory = (c, newSt) => {
      const prev = Array.isArray(c.statusHistory) ? c.statusHistory : [];
      // 直前と同じステータスなら記録しない
      if (prev.length > 0 && prev[prev.length-1].status === newSt) return prev;
      return [...prev, {status: newSt, date: todayISO, ca: CA_MY_NAME}];
    };
    const updated = candidates.map(c => c.id === id
      ? {...c, status: newStatus, caStatus: newStatus, ...autoDateFields(c, newStatus), statusHistory: addHistory(c, newStatus)}
      : c
    );
    setCandidates(updated);
    try {
      const stored = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
      const merged = stored.map(c => {
        if (c.id !== id) return c;
        return {...c, status: newStatus, caStatus: newStatus, ...autoDateFields(c, newStatus), statusHistory: addHistory(c, newStatus)};
      });
      localStorage.setItem('crm-candidates', JSON.stringify(merged));
      // 承諾ステータスに変更したとき crm-accepted へ自動追加（重複なし）
      if (newStatus === '承諾') {
        try {
          const acc = JSON.parse(localStorage.getItem('crm-accepted') || '[]');
          const cand = merged.find(x => x.id === id) || {};
          if (!acc.find(a => a.id === id)) {
            const todayAcc = new Date().toISOString().slice(0, 10);
            acc.push({
              id,
              name: cand.name || '',
              age: cand.age || null,
              assignedCA: cand.assignedCA || CA_MY_NAME,
              companyName: cand.companyName || '',
              acceptedAt: todayAcc,
              acceptanceDate: todayAcc,
              contractAmount: '',
              result: '承諾',
              joiningDate: '',
            });
            localStorage.setItem('crm-accepted', JSON.stringify(acc));
          }
        } catch {}
      }
      window.dispatchEvent(new CustomEvent('crm-data-changed'));
    } catch {}
  };

  const handleInlineField = (id, field, value) => {
    const updated = candidates.map(c => c.id === id ? {...c, [field]: value} : c);
    setCandidates(updated);
    try {
      const stored = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
      const merged = stored.map(c => c.id === id ? {...c, [field]: value} : c);
      localStorage.setItem('crm-candidates', JSON.stringify(merged));
      window.dispatchEvent(new CustomEvent('crm-data-changed'));
    } catch {}
  };

  const handleEndedToggle = (c) => {
    const newEnded = !c.ended;
    // 終了にするとき endedAt（YYYY-MM）を記録。解除するときはクリア。
    const now = new Date();
    const endedAt = newEnded
      ? `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`
      : null;
    const changes = { ended: newEnded, endedAt };
    const updated = candidates.map(x => x.id === c.id ? {...x, ...changes} : x);
    setCandidates(updated);
    try {
      const stored = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
      const merged = stored.map(x => x.id === c.id ? {...x, ...changes} : x);
      localStorage.setItem('crm-candidates', JSON.stringify(merged));
      window.dispatchEvent(new CustomEvent('crm-data-changed'));
    } catch {}
  };

  // 当月（YYYY-MM）
  const currentMonth = (() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  })();

  const statuses = ['全て', ...new Set(candidates.map(c => c.status))];
  const filtered = React.useMemo(() => {
    let data = [...candidates];
    // 終了済み候補者：endedAt が当月の場合のみ表示（翌月以降は非表示）
    data = data.filter(c => {
      if (!c.ended) return true;
      // endedAt がない古いデータは当月扱いで表示（今月中は見える）
      const ea = c.endedAt || currentMonth;
      return ea === currentMonth;
    });
    if (search) data = data.filter(c => c.name.includes(search) || (c.companyName||'').includes(search) || (c.sourceCompany||'').includes(search));
    if (statusFilter !== '全て') data = data.filter(c => c.status === statusFilter);
    data.sort((a, b) => {
      // 終了済みは常に下へ
      if (!!a.ended !== !!b.ended) return a.ended ? 1 : -1;
      if (sortKey === 'status') {
        const ai = CA_STATUS_ORDER.indexOf(a.status);
        const bi = CA_STATUS_ORDER.indexOf(b.status);
        return sortDir === 'asc' ? (ai===-1?999:ai)-(bi===-1?999:bi) : (bi===-1?999:bi)-(ai===-1?999:ai);
      }
      let va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
      if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
    return data;
  }, [search, statusFilter, sortKey, sortDir, candidates]);

  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };
  const sortIcon = (key) => sortKey === key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';

  const todayDateStr = new Date().toISOString().slice(0, 10);

  return (
    <div className="card">
      <div className="card-header">
        <div className="card-title">担当求職者一覧 <span className="text-muted" style={{fontWeight:'400'}}>({filtered.length}件)</span></div>
        <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
          <input className="search-input" placeholder="名前・企業名で検索..." value={search} onChange={e=>setSearch(e.target.value)} />
          <select className="filter-select" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
            {statuses.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <div className="data-table-wrap" style={{maxHeight:'calc(100vh - 180px)', overflowX:'auto'}}>
        <table className="data-table">
          <thead>
            <tr>
              <th onClick={()=>handleSort('name')} style={{cursor:'pointer', minWidth:'6em'}}>氏名{sortIcon('name')}</th>
              <th style={{minWidth:'130px', cursor:'pointer'}} onClick={()=>handleSort('status')}>ステータス{sortIcon('status')}</th>
              <th onClick={()=>handleSort('createdAt')} style={{cursor:'pointer',whiteSpace:'nowrap',textAlign:'center'}}>面接設定{sortIcon('createdAt')}</th>
              <th onClick={()=>handleSort('firstInterviewDate')} style={{cursor:'pointer',whiteSpace:'nowrap',textAlign:'center'}}>初回面接{sortIcon('firstInterviewDate')}</th>
              <th onClick={()=>handleSort('age')} style={{cursor:'pointer'}}>年齢{sortIcon('age')}</th>
              <th onClick={()=>handleSort('jobType')} style={{cursor:'pointer'}}>職種{sortIcon('jobType')}</th>
              <th onClick={()=>handleSort('sourceCompany')} style={{cursor:'pointer',whiteSpace:'nowrap'}}>流入企業{sortIcon('sourceCompany')}</th>
              <th style={{whiteSpace:'nowrap'}}>企業提案日程</th>
              <th style={{whiteSpace:'nowrap'}}>推薦</th>
              <th style={{whiteSpace:'nowrap'}}>企業面接</th>
              <th style={{textAlign:'center',width:'44px'}} title="終了チェックで案件を終了にする">終了</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((c) => {
              const isEnded = !!c.ended;
              const earliestIv = getEarliestInterview(c.id);
              return (
                <tr key={c.id} style={{opacity: isEnded ? 0.45 : 1, background: isEnded ? 'var(--bg-hover)' : ''}}>
                  <td className="name" style={{color: isEnded ? 'var(--text-muted)' : '', minWidth:'6em', whiteSpace:'normal', wordBreak:'keep-all'}}>{c.name}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:'4px',position:'relative'}}>
                      <select
                        className="filter-select"
                        value={c.status}
                        onChange={e => handleInlineStatus(c.id, e.target.value)}
                        style={{minWidth:'120px', fontSize:'14px'}}
                      >
                        {STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      {Array.isArray(c.statusHistory) && c.statusHistory.length > 0 && (
                        <span
                          onClick={()=>setHistoryId(historyId===c.id ? null : c.id)}
                          style={{fontSize:'11px',color:'var(--text-muted)',cursor:'pointer',padding:'1px 5px',border:'1px solid var(--border)',borderRadius:'10px',whiteSpace:'nowrap',background:'var(--bg-base)'}}
                          title="ステータス履歴を表示"
                        >履歴{c.statusHistory.length}</span>
                      )}
                      {historyId === c.id && Array.isArray(c.statusHistory) && (

function RevenuePage({ period }) {
  const loadRevCandidates = () => {
    try {
      const s = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
      return Array.isArray(s) ? s.filter(c => c.assignedCA === CA_MY_NAME) : [];
    } catch { return []; }
  };
  const [revCands, setRevCands] = React.useState(loadRevCandidates);
  const [revMetrics, setRevMetrics] = React.useState(() => _loadMyMetrics(period));
  React.useEffect(() => {
    setRevCands(loadRevCandidates()); setRevMetrics(_loadMyMetrics(period)); // 月変更時に即時更新
    const reload = () => { setRevCands(loadRevCandidates()); setRevMetrics(_loadMyMetrics(period)); };
    window.addEventListener('focus', reload);
    return () => window.removeEventListener('focus', reload);
  }, [period]);
  const MY_REVENUE = revMetrics.revenue || { current: 0, target: 3000000, requiredByToday: 0 };
  const caStatus = c => c.caStatus || c.status || '';

  // 見込みランクは「推薦」ステージ以降のみ対象
  // ランクは企業面接管理で CA が手動設定（meta.rank）。未設定時はステージ別デフォルト
  const loadRevMeta = () => { try { return JSON.parse(localStorage.getItem('crm-candidate-meta') || '{}'); } catch { return {}; } };
  const loadRevPlans = () => { try { return JSON.parse(localStorage.getItem('crm-interview-plans') || '{}'); } catch { return {}; } };
  const [revMeta] = React.useState(loadRevMeta);
  const [revPlans] = React.useState(loadRevPlans);

  // 選択月キー（"2026/05" → "2026-05"）
  const periodKey = period ? period.replace('/', '-') : (() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  })();

  const FORECAST_ST = ['推薦','面接対策１','面接対策２','企業面接','企業面接1','企業面接2','内定','承諾'];
  // ランク別一覧：選択月に面接日がある人のみ表示
  const forecastCands = revCands.filter(c => {
    if (!FORECAST_ST.includes(caStatus(c))) return false;
    // その月に interview plans の date がある
    const cpList = revPlans[c.id] || [];
    return cpList.some(cp => (cp.date || '').startsWith(periodKey));
  });
  const getEffectiveRank = (c) => {
    const mr = (revMeta[c.id] || {}).rank;
    if (mr) return mr;
    const cs = caStatus(c);
    if (['承諾','内定'].includes(cs)) return '100%';
    if (['企業面接','企業面接1','企業面接2','面接対策１','面接対策２'].includes(cs)) return '70%';
    return '50%'; // 推薦 デフォルト
  };
  const rank100 = forecastCands.filter(c => getEffectiveRank(c) === '100%');
  const rank70  = forecastCands.filter(c => getEffectiveRank(c) === '70%');
  const rank50  = forecastCands.filter(c => getEffectiveRank(c) === '50%');
  const rank30  = forecastCands.filter(c => getEffectiveRank(c) === '30%');
  const rankData = [
    { rank: '100%', items: rank100, weight: 1.0 },
    { rank: '70%',  items: rank70,  weight: 0.7 },
    { rank: '50%',  items: rank50,  weight: 0.5 },
    { rank: '30%',  items: rank30,  weight: 0.3 },
  ];
  const totalWeighted = rankData.reduce((sum, r) => sum + r.items.reduce((s, c) => s + c.expectedRevenue * r.weight, 0), 0);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="kpi-card" style={{'--kpi-color':'var(--chart-3)'}}>
          <div className="kpi-label">承諾数</div>
          <div className="kpi-value">{rank100.length}</div>
          <div className="kpi-target">内定含む確定分</div>
        </div>
        <div className="kpi-card" style={{'--kpi-color':'var(--chart-1)'}}>
          <div className="kpi-label">受注金額</div>
          <div className="kpi-value" style={{fontSize:'20px'}}>{fmtYen(MY_REVENUE.current)}</div>
          <div className="kpi-target">目標: {fmtYen(MY_REVENUE.target)}</div>
        </div>
        <div className="kpi-card" style={{'--kpi-color':'var(--chart-4)'}}>
          <div className="kpi-label">見込み売上</div>
          <div className="kpi-value" style={{fontSize:'20px'}}>{fmtYen(forecastCands.reduce((s,c)=>s+c.expectedRevenue,0))}</div>
          <div className="kpi-target">全見込合計</div>
        </div>
        <div className="kpi-card" style={{'--kpi-color':'var(--chart-2)'}}>
          <div className="kpi-label">加重見込み</div>
          <div className="kpi-value" style={{fontSize:'20px'}}>{fmtYen(Math.round(totalWeighted))}</div>
          <div className="kpi-target">確率加重平均</div>
        </div>
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><div className="card-title">受注進捗ドーナツ</div></div>
          <div className="card-body" style={{display:'flex',justifyContent:'center'}}>
            <DonutChart target={MY_REVENUE.target} requiredByToday={MY_REVENUE.requiredByToday} current={MY_REVENUE.current} size={170} />
          </div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">ランク別・求職者一覧</div></div>
          <div className="card-body" style={{padding:'0'}}>
            {rankData.map((r, i) => {
              const rankColor = i===0?'var(--success)':i===1?'var(--accent)':i===2?'var(--chart-4)':'var(--text-muted)';
              return r.items.length > 0 ? (
                <div key={i} style={{borderBottom:'1px solid var(--border-light)', padding:'8px 16px'}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}>
                    <span style={{fontWeight:'700', fontSize:'14px', color:rankColor}}>{r.rank} 確率</span>
                    <span style={{fontSize:'15px', color:'var(--text-muted)'}}>計: {fmtYen(r.items.reduce((s,c)=>s+c.expectedRevenue,0))} → 加重: {fmtYen(Math.round(r.items.reduce((s,c)=>s+c.expectedRevenue*r.weight,0)))}</span>
                  </div>
                  {r.items.map((c, j) => (
                    <div key={j} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'3px 0', fontSize:'14px'}}>
                      <span style={{fontWeight:'500'}}>{c.name}</span>
                      <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
                        <StatusBadge status={caStatus(c)} />
                        <span style={{fontWeight:'700', color:'var(--success)', minWidth:'80px', textAlign:'right'}}>{fmtYen(c.expectedRevenue)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              ) : null;
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function InterviewsPage() {
  const loadCandidates = () => {
    try {
      const stored = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
      return Array.isArray(stored) ? stored.filter(c => c.assignedCA === CA_MY_NAME) : [];
    } catch { return []; }
  };
  const loadPlans = () => { try { return JSON.parse(localStorage.getItem('crm-interview-plans') || '{}'); } catch { return {}; } };
  const loadMeta = () => { try { return JSON.parse(localStorage.getItem('crm-candidate-meta') || '{}'); } catch { return {}; } };

  const [candidates, setCandidates] = React.useState(loadCandidates);
  React.useEffect(() => {
    const reload = () => setCandidates(loadCandidates());
    window.addEventListener('focus', reload);
    return () => window.removeEventListener('focus', reload);
  }, []);
  const [plans, setPlans] = React.useState(loadPlans);
  const [meta, setMeta] = React.useState(loadMeta);

  const pipelineCandidates = React.useMemo(() => {
    const list = candidates.filter(c => {
      const cs = c.caStatus || c.status || '';
      return ['推薦','面接対策１','面接対策２','企業面接','企業面接1','企業面接2','選考中','内定','承諾'].includes(cs);
    });
    // 終了/非終了で分けて並べる。終了は新しい終了日が上。
    const active = [];
    const terminated = [];
    for (const c of list) {
      if ((meta[c.id] || {}).terminated) terminated.push(c);
      else active.push(c);
    }
    terminated.sort((a, b) => {
      const da = (meta[a.id] || {}).terminatedAt || '';
      const db = (meta[b.id] || {}).terminatedAt || '';
      return db.localeCompare(da); // 新しい終了日が上
    });
    return [...active, ...terminated];
  }, [candidates, meta]);

  // 終了状態のトグル（メタに terminated と terminatedAt を同時に保存）
  const toggleTerminated = (cid, value) => {
    const cur = meta[cid] || {};
    const next = { ...cur, terminated: value };
    if (value) {
      next.terminatedAt = new Date().toISOString().slice(0,10);
    }
    saveMeta({ ...meta, [cid]: next });
  };

  const savePlans = (newPlans) => {
    setPlans(newPlans);
    try { localStorage.setItem('crm-interview-plans', JSON.stringify(newPlans)); } catch {}
  };
  const saveMeta = (newMeta) => {
    setMeta(newMeta);
    try { localStorage.setItem('crm-candidate-meta', JSON.stringify(newMeta)); } catch {}
  };

  const addCompany = (cid) => {
    savePlans({ ...plans, [cid]: [...(plans[cid] || []), { company: '', date: '', selectionStatus: '書類選考中', offerDeadline: '', pendingConfirm: false, alertDays: 3 }] });
  };
  const updateCompany = (cid, idx, field, value) => {
    const arr = [...(plans[cid] || [])];
    if (typeof field === 'object') {
      arr[idx] = { ...arr[idx], ...field };
      savePlans({ ...plans, [cid]: arr });
      return;
    }
    arr[idx] = { ...arr[idx], [field]: value };
    savePlans({ ...plans, [cid]: arr });
    if (field === 'selectionStatus') {
      const companyName = arr[idx].company || '';
      if (value === '内定承諾') {
        // 内定承諾時に crm-accepted へ自動登録
        try {
          const acc = JSON.parse(localStorage.getItem('crm-accepted') || '[]');
          const cand = candidates.find(c => c.id === cid);
          if (cand) {
            const alreadyExists = acc.some(a => a.id === cid && a.companyName === companyName);
            if (!alreadyExists) {
              const _today = new Date().toISOString().slice(0,10);
              acc.push({
                ...cand,
                companyName,
                acceptanceDate: _today,
                acceptedAt: _today,
                joiningDate: '',
                contractAmount: '',
                memo: cand.memo || '',
              });
              localStorage.setItem('crm-accepted', JSON.stringify(acc));
            }
          }
        } catch {}
      } else {
        // 内定承諾以外に戻した場合は crm-accepted から削除（誤登録の取り消し）
        try {
          const acc = JSON.parse(localStorage.getItem('crm-accepted') || '[]');
          const prevStatus = (plans[cid]?.[idx]?.selectionStatus) || '';
          if (prevStatus === '内定承諾') {
            const cleaned = acc.filter(a => !(a.id === cid && a.companyName === companyName));
            localStorage.setItem('crm-accepted', JSON.stringify(cleaned));
          }
        } catch {}
      }
    }
  };
  const removeCompany = (cid, idx) => {
    const arr = [...(plans[cid] || [])];
    arr.splice(idx, 1);
    savePlans({ ...plans, [cid]: arr });
  };
  const updateMeta = (cid, field, value) => {
    saveMeta({ ...meta, [cid]: { ...(meta[cid] || {}), [field]: value } });
  };

  const getRowStyle = (status) => {
    const grayed = ['選考辞退','書類お見送り','面接お見送り'].includes(status);
    if (grayed) return { bg: '#9ca3af', color: '#ffffff', opacity: 1 };
    if (status === 'オファー面談' || status === '内定') return { bg: '#fff3e0', color: '#d97706', opacity: 1 };
    if (status === '内定承諾' || status === '入社確定') return { bg: '#f97316', color: '#ffffff', opacity: 1 };
    return { bg: 'var(--bg-card)', color: 'var(--text-primary)', opacity: 1 };
  };

  return (
    <div style={{display:'flex', flexDirection:'column', gap:'14px'}}>
      <div className="card">
        <div className="card-header">
          <div className="card-title">📋 推薦済み・選考ステータス</div>
          <span className="badge-count">{pipelineCandidates.length}</span>
        </div>
        <div className="card-body" style={{display:'flex',flexDirection:'column',gap:'16px',padding:'12px'}}>
          {pipelineCandidates.length === 0 && (
            <div style={{color:'var(--text-muted)',fontSize:'15px',padding:'24px 0',textAlign:'center'}}>
              推薦済みの求職者がいません
            </div>
          )}
          {pipelineCandidates.map(c => {
            const m = meta[c.id] || {};
            const companyList = plans[c.id] || [];
            const isTerminated = !!m.terminated;
            return (
              <div key={c.id} style={{
                border:'1px solid var(--border)',borderRadius:'var(--radius)',overflow:'hidden',boxShadow:'var(--shadow)',
                background: isTerminated ? '#f3f4f6' : 'var(--bg-card)',
                opacity: isTerminated ? 0.65 : 1,
              }}>
                {/* 候補者ヘッダー */}
                <div style={{
                  background: isTerminated ? '#e5e7eb' : 'var(--accent-subtle)',
                  borderBottom:'1px solid var(--border)',padding:'10px 14px',
                  display:'flex',flexWrap:'wrap',gap:'10px',alignItems:'center',
                }}>
                  <span style={{
                    fontWeight:'700',fontSize:'14px',
                    color: isTerminated ? 'var(--text-muted)' : 'var(--text-primary)',
                    minWidth:'90px',
                    textDecoration: isTerminated ? 'line-through' : 'none',
                  }}>{c.name}</span>
                  <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'13px',color:'var(--text-secondary)',cursor:'pointer'}}>
                    <input type="checkbox" checked={isTerminated} onChange={e=>toggleTerminated(c.id, e.target.checked)}
                      style={{width:'15px',height:'15px',cursor:'pointer'}}/>
                    終了
                    {isTerminated && m.terminatedAt && (
                      <span style={{fontSize:'11px',color:'var(--text-muted)',marginLeft:'2px'}}>({m.terminatedAt.replace(/^(\d{4})-(\d{2})-(\d{2})$/,(_,y,mo,d)=>`${parseInt(mo)}/${parseInt(d)}`)})</span>
                    )}
                  </label>
                  <StatusBadge status={c.status} />
                  <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'14px',color:'var(--text-secondary)'}}>
                    見込み:
                    <select value={m.rank || ''} onChange={e=>updateMeta(c.id,'rank',e.target.value)}
                      style={{border:'1px solid var(--border)',borderRadius:'4px',padding:'2px 6px',fontSize:'14px',background:'var(--bg-card)',color: m.rank==='100%'?'var(--success)':m.rank==='70%'?'var(--accent)':'var(--text-primary)',fontWeight:'600'}}>
                      <option value="">-</option>
                      {PROSPECT_RANK_OPTIONS.map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'14px',color:'var(--text-secondary)'}}>
                    他社選考:
                    <select value={m.hasOtherSelection || ''} onChange={e=>updateMeta(c.id,'hasOtherSelection',e.target.value)}
                      style={{border:'1px solid var(--border)',borderRadius:'4px',padding:'2px 6px',fontSize:'14px',background:'var(--bg-card)'}}>
                      <option value="">-</option>
                      <option value="あり">あり</option>
                      <option value="なし">なし</option>
                    </select>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'14px',color:'var(--text-secondary)'}}>
                    他エージェント:
                    <select value={m.hasAgent || ''} onChange={e=>updateMeta(c.id,'hasAgent',e.target.value)}
                      style={{border:'1px solid var(--border)',borderRadius:'4px',padding:'2px 6px',fontSize:'14px',background:'var(--bg-card)'}}>
                      <option value="">-</option>
                      <option value="あり">あり</option>
                      <option value="なし">なし</option>
                    </select>

                  <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'14px',color:'var(--text-secondary)'}}>
                    希望入社月:
                    <input type="month" value={m.desiredJoinMonth || ''} onChange={e=>updateMeta(c.id,'desiredJoinMonth',e.target.value)}
