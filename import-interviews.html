function normName(s) {
  return (s||'').replace(/\s/g,'').replace(/様$/,'').replace(/　/g,'').replace(/　/g,'');
}

function runImport() {
  const el = document.getElementById('result');
  el.className='result info';
  el.textContent='処理中...';
  
  try {
    const candidates = JSON.parse(localStorage.getItem('crm-candidates') || '[]');
    if (candidates.length === 0) {
      el.className='result err';
      el.innerHTML='⚠️ CRMの候補者データが見つかりません。<br>先にCRMを開いてデータを確認してから、このページを再度開いてください。';
      return;
    }
    
    const plans = JSON.parse(localStorage.getItem('crm-interview-plans') || '{}');
    const meta = JSON.parse(localStorage.getItem('crm-candidate-meta') || '{}');
    
    const allImportCands = Object.entries(IMPORT_DATA).flatMap(([ca, arr]) => 
      arr.map(c => ({...c, _caSheet: ca}))
    );
    
    let matched = 0, skipped = 0, noMatch = 0;
    const log = [];
    
    for (const cand of candidates) {
      const caName = cand.assignedCA || cand.caName || '';
      const candName = normName(cand.name || '');
      if (!candName) continue;
      
      // Find match: prefer same CA sheet
      let match = null;
      const caSheet = IMPORT_DATA[caName];
      if (caSheet) {
        match = caSheet.find(ic => normName(ic.name) === candName);
      }
      // Fallback: search all sheets
      if (!match) {
        match = allImportCands.find(ic => normName(ic.name) === candName);
      }
      
      if (!match) {
        noMatch++;
        continue;
      }
      
      // Interview plans (skip if already has data)
      if (match.companies && match.companies.length > 0) {
        if (!plans[cand.id] || plans[cand.id].length === 0) {
          plans[cand.id] = match.companies;
          matched++;
          log.push('✅ ' + cand.name + ' → ' + match.companies.length + '社');
        } else {
          skipped++;
          log.push('⏭ ' + cand.name + '（既存データあり、スキップ）');
        }
      }
      
      // Meta (merge, don't overwrite existing values)
      if (!meta[cand.id]) meta[cand.id] = {};
      if (match.rank && !meta[cand.id].rank) meta[cand.id].rank = match.rank;
      if (match.hasOtherSelection && !meta[cand.id].hasOtherSelection) meta[cand.id].hasOtherSelection = match.hasOtherSelection;
      if (match.hasAgent && !meta[cand.id].hasAgent) meta[cand.id].hasAgent = match.hasAgent;
      if (match.desiredJoinMonth && !meta[cand.id].desiredJoinMonth) meta[cand.id].desiredJoinMonth = match.desiredJoinMonth;
    }
    
    localStorage.setItem('crm-interview-plans', JSON.stringify(plans));
    localStorage.setItem('crm-candidate-meta', JSON.stringify(meta));
    
    el.className='result ok';
    el.innerHTML = '<strong>✅ インポート完了</strong><br>'
      + 'マッチ・取込: <strong>' + matched + '名</strong><br>'
      + 'スキップ（既存）: ' + skipped + '名<br>'
      + '未マッチ: ' + noMatch + '名（CRMに未登録の可能性）<br><br>'
      + '<details><summary>詳細ログ（' + log.length + '件）</summary>'
      + '<pre style="font-size:12px;margin-top:8px;white-space:pre-wrap">' + log.join('\n') + '</pre>'
      + '</details><br>'
      + '<a href="index.html" style="color:#1d4ed8;font-weight:bold">→ CRMに戻る</a>';
      
  } catch(e) {
    el.className='result err';
    el.textContent='エラー: ' + e.message;
  }
}
